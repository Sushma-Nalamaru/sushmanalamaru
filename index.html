<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sushma Nalamaru</title>

  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'JetBrains Mono', monospace;
      background: linear-gradient(135deg, #0f0f1e, #1a0f2e);
      color: #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }

    .card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 40px;
      text-align: center;
      max-width: 500px;
      width: 90%;
      box-shadow: 0 0 40px rgba(124,58,237,0.2);
    }

    h1 {
      font-size: 42px;
      margin: 0;
    }

    .accent {
      background: linear-gradient(to right, #7c3aed, #06b6d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p {
      color: #9ca3af;
      line-height: 1.6;
      margin: 20px 0;
    }

    .buttons {
      margin-top: 25px;
    }

    .btn {
      display: inline-block;
      margin: 8px;
      padding: 12px 20px;
      border-radius: 10px;
      text-decoration: none;
      font-size: 14px;
      border: 1px solid rgba(255,255,255,0.2);
      transition: 0.3s;
    }

    .btn-primary {
      background: #7c3aed;
      color: white;
    }

    .btn-primary:hover {
      background: #6d28d9;
    }

    .btn-outline {
      color: #06b6d4;
    }

    .btn-outline:hover {
      background: rgba(6,182,212,0.1);
    }

    .socials {
      margin-top: 25px;
    }

    .socials a {
      margin: 0 10px;
      color: #06b6d4;
      text-decoration: none;
      font-size: 18px;
    }

    .footer {
      margin-top: 30px;
      font-size: 12px;
      color: #6b7280;
    }
  </style>
</head>

<body>

  <div class="card">
    <h1>
      Sushma <span class="accent">Nalamaru</span>
    </h1>

    <p>Software Engineer & Tech Enthusiast</p>

    <p>
      I build clean, scalable digital experiences with a focus on design,
      performance, and real-world impact.
    </p>

    <div class="buttons">
      <a href="https://github.com/SushmaNalamaru" class="btn btn-primary" target="_blank">
        View GitHub
      </a>

      <a href="#" class="btn btn-outline">
        Download Resume
      </a>
    </div>

    <div class="socials">
      <a href="https://github.com/SushmaNalamaru" target="_blank">GitHub</a>
      <a href="https://linkedin.com" target="_blank">LinkedIn</a>
      <a href="mailto:your@email.com">Email</a>
    </div>

    <div class="footer">
      © 2020 Sushma Nalamaru
    </div>
  </div>

</body>
</html>
